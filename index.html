<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0a0a0a;
    --text:#ffffff;
    --muted:#9ca3af;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
}

.container{
    text-align:center;
    max-width:700px;
}

.banner{
    position:fixed;
    top:16px;
    left:50%;
    transform:translateX(-50%);
    padding:10px 16px;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:999px;
    color:#c4b5fd;
    font-size:0.9rem;
    background:rgba(139,92,246,0.08);
    backdrop-filter:blur(6px);
}

.logo{
    font-size:70px;
    margin-bottom:20px;
}

h1{
    font-size:clamp(3rem,8vw,5rem);
    font-weight:700;
    margin-bottom:16px;
}

p{
    color:var(--muted);
    font-size:1.1rem;
    line-height:1.6;
    margin-bottom:32px;
}

.buttons{
    display:flex;
    flex-direction:column;
    gap:14px;
    align-items:center;
}

.download-btn{
    width:100%;
    max-width:320px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    background:linear-gradient(135deg,#8b5cf6,#a855f7);
    color:white;
    padding:16px 34px;
    border-radius:14px;
    font-weight:600;
    font-size:1rem;
    transition:.2s;
}

.download-btn:hover{
    transform:translateY(-2px);
}

.footer{
    margin-top:48px;
    color:#6b7280;
    font-size:.9rem;
}
</style>
</head>

<body>

<div class="banner">Luna 2.1 coming soon 👀</div>

<div class="container">

    <div class="logo">🫟</div>

    <h1>Luna</h1>

    <p>
        The AI assistant built for speed, simplicity, and everyday use.
    </p>

    <div class="buttons">

        <a class="download-btn" href="https://www.icloud.com/shortcuts/a533ff84fcf04557a57e8d71fd1c5376">
            Download Luna 2.0
        </a>

        <a class="download-btn" href="https://www.icloud.com/shortcuts/8958aa059c38414cbf0176571f4c9d4a">
            Download Imagine 1.1
        </a>

    </div>

    <div class="footer">
        Copyright © 2026 Luna Labs
    </div>

</div>

</body>
</html>
